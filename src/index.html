<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Fonte Roboto 500 -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@500&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="style.css"
    />
    <title>Moyo Header</title>
  </head>
  <body>
    <header class="header">
      <div class="container">
        <!-- Logo -->
        <a
          href="#"
          class="logo-link"
        >
          <img
            src="./images/logo.png"
            alt="Moyo logo"
            class="logo"
          />
        </a>

        <!-- Navegação -->
        <nav
          class="nav"
          aria-label="Main navigation"
        >
          <ul class="nav__list">
            <li class="nav__item">
              <a
                href="#"
                class="nav__link"
              >
                Apple
              </a>
            </li>
            <li class="nav__item">
              <a
                href="#"
                class="nav__link"
              >
                Samsung
              </a>
            </li>
            <li class="nav__item">
              <a
                href="#"
                class="nav__link"
              >
                Smartphones
              </a>
            </li>
            <li class="nav__item">
              <a
                href="#"
                class="nav__link is-active"
              >
                Laptops & Computers
              </a>
            </li>
            <li class="nav__item">
              <a
                href="#"
                class="nav__link"
              >
                Gadgets
              </a>
            </li>
            <li class="nav__item">
              <a
                href="#"
                class="nav__link"
              >
                Tablets
              </a>
            </li>
            <li class="nav__item">
              <a
                href="#"
                class="nav__link"
              >
                Photo
              </a>
            </li>
            <li class="nav__item">
              <a
                href="#"
                class="nav__link"
              >
                Video
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
  </body>
</html>
